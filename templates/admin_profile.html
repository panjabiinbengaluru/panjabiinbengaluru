{% extends "base.html" %}
{% block title %}Admin Profile | Admin Portal{% endblock %}

{% block extra_css %}
<style>
    .profile-container { max-width: 600px; margin: 4rem auto; padding: 0 2rem; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .back-link { color: var(--gold); text-decoration: none; font-size: 0.9rem; }
    
    .card { background: rgba(10,15,30,0.5); border: 1px solid var(--border); border-radius: 8px; padding: 2rem; margin-bottom: 2rem; }
    .card h3 { color: var(--gold); margin-bottom: 1.5rem; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
    
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; color: var(--text-muted); margin-bottom: 0.5rem; font-size: 0.9rem; }
    .form-control { width: 100%; padding: 0.8rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 4px; color: var(--white); font-size: 1rem; }
    
    .btn-submit { background: var(--gold); color: black; border: none; padding: 0.8rem 1.5rem; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; transition: all 0.3s ease; }
    .btn-submit:hover { background: #d4af37; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(200,168,75,0.2); }
</style>
{% endblock %}

{% block content %}
<div class="profile-container fade-up visible">
    <div class="page-header">
        <h2 class="section-title" style="font-size: 2rem;">Admin <span>Profile</span></h2>
        <a href="{{ url_for('admin_dashboard') }}" class="back-link">← Back to Dashboard</a>
    </div>

    <!-- Profile Update -->
    <div class="card">
        <h3><i class="fas fa-user-edit"></i> Update Profile</h3>
        <form method="POST" action="{{ url_for('admin_profile') }}">
            <input type="hidden" name="action" value="update_profile">
            <div class="form-group">
                <label for="email">Admin Email (Cannot be changed)</label>
                <input type="email" id="email" class="form-control" value="{{ admin.email }}" disabled style="opacity: 0.7; cursor: not-allowed;">
            </div>
            <div class="form-group">
                <label for="name">Display Name</label>
                <input type="text" id="name" name="name" class="form-control" value="{{ admin.name }}" required>
            </div>
            <button type="submit" class="btn-submit">Save Profile</button>
        </form>
    </div>

    <!-- Password Change -->
    <div class="card">
        <h3><i class="fas fa-lock"></i> Change Password</h3>
        <form method="POST" action="{{ url_for('admin_profile') }}">
            <input type="hidden" name="action" value="change_password">
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="new_password">New Password (Min 8 characters)</label>
                <input type="password" id="new_password" name="new_password" class="form-control" required minlength="8">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required minlength="8">
            </div>
            <button type="submit" class="btn-submit">Change Password</button>
        </form>
    </div>
</div>
{% endblock %}
