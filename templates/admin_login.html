{% extends "base.html" %}
{% block title %}Admin Login | Panjabi in Bengaluru{% endblock %}

{% block extra_css %}
<style>
    .auth-container { max-width: 450px; margin: 4rem auto; padding: 2rem; background: rgba(10,15,30,0.8); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; text-align: center; } /* Add slight red tint to indicate dangerous area */
    .form-group { margin-bottom: 1.5rem; text-align: left; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--gold); font-size: 0.9rem; }
    .form-group input { width: 100%; padding: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: var(--white); outline: none; transition: border-color 0.3s; }
    .form-group input:focus { border-color: var(--gold); }
</style>
{% endblock %}

{% block content %}
<div class="auth-container fade-up visible">
    <h2 class="section-title" style="font-size: 2.2rem; margin-bottom: 0.5rem; color: #FCA5A5;">Admin <span>Portal</span></h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Restricted Access: Authorized Personnel Only.</p>
    
    <form method="POST">
        <div class="form-group">
            <label>Admin Email</label>
            <input type="email" name="email" required placeholder="admin@domain.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem; background: linear-gradient(135deg, #EF4444 0%, #B91C1C 100%); color: white; border:none; box-shadow:0 4px 20px rgba(239,68,68,0.3);">Access Portal <i class="fas fa-lock"></i></button>
    </form>
</div>
{% endblock %}
