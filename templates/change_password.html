{% extends "base.html" %}
{% block title %}Change Password | Panjabi in Bengaluru{% endblock %}

{% block extra_css %}
<style>
    .auth-container { max-width: 450px; margin: 4rem auto; padding: 2rem; background: rgba(10,15,30,0.8); border: 1px solid var(--border); border-radius: 12px; text-align: center; }
    .form-group { margin-bottom: 1.5rem; text-align: left; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--gold); font-size: 0.9rem; }
    .form-group input { width: 100%; padding: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: var(--white); outline: none; transition: border-color 0.3s; }
    .form-group input:focus { border-color: var(--gold); }
</style>
{% endblock %}

{% block content %}
<div class="auth-container fade-up visible">
    <h2 class="section-title" style="font-size: 2.2rem; margin-bottom: 0.5rem;">Secure Your <span>Account</span></h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Since this is your first login (or you requested a reset), please set a new secure password.</p>
    
    <form method="POST">
        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="new_password" required minlength="6" placeholder="At least 6 characters">
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" required placeholder="Repeat new password">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">Update Password</button>
    </form>
</div>
{% endblock %}
