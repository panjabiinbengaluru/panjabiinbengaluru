{% extends "base.html" %}
{% block title %}Member Login | Panjabi in Bengaluru{% endblock %}

{% block extra_css %}
<style>
    .auth-container { max-width: 450px; margin: 4rem auto; padding: 2rem; background: rgba(10,15,30,0.8); border: 1px solid var(--border); border-radius: 12px; text-align: center; }
    .form-group { margin-bottom: 1.5rem; text-align: left; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--gold); font-size: 0.9rem; }
    .form-group input { width: 100%; padding: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: var(--white); outline: none; transition: border-color 0.3s; }
    .form-group input:focus { border-color: var(--gold); }
</style>
{% endblock %}

{% block content %}
<div class="auth-container fade-up visible">
    <h2 class="section-title" style="font-size: 2.5rem; margin-bottom: 0.5rem;">Member <span>Login</span></h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Welcome back. Please sign in to your dashboard.</p>
    
    <form method="POST">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">Sign In <i class="fas fa-arrow-right"></i></button>
    </form>
</div>
{% endblock %}
